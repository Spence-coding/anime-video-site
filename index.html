<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻影动漫 · AI视频生成</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0900;
    --paper: #fff8ee;
    --orange: #f97316;
    --amber: #f59e0b;
    --gold: #d97706;
    --muted: #92784a;
    --border: #ffffff18;
    --panel: #1a1100;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, #f9731618 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, #d9770618 0%, transparent 60%),
      radial-gradient(circle, #ffffff05 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 5px 5px;
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 10;
    padding: 1.5rem 3rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #f9731618;
  }
  .logo { display: flex; align-items: center; gap: 1rem; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--orange), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  }
  .logo-cn {
    font-weight: 900; font-size: 1.3rem;
    background: linear-gradient(90deg, var(--amber), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.1em; display: block;
  }
  .logo-en {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; color: var(--muted); letter-spacing: 0.35em; display: block;
  }
  .header-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.2em; color: var(--orange);
    border: 1px solid #f9731635; padding: 0.3rem 0.8rem; background: #f9731608;
  }

  .hero {
    position: relative; z-index: 10;
    padding: 3rem 3rem 1.5rem;
  }
  .hero-eye {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.5em; color: var(--orange);
    margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.8rem;
  }
  .hero-eye::before { content:''; width:22px; height:1px; background:var(--orange); }
  .hero-title { font-size: clamp(2rem,5vw,3.8rem); font-weight:900; line-height:1.1; margin-bottom:0.6rem; }
  .hero-title .hl {
    background: linear-gradient(90deg, var(--amber), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-sub { font-family:'Share Tech Mono',monospace; font-size:0.68rem; color:var(--muted); letter-spacing:0.12em; }

  .main {
    position: relative; z-index: 10;
    padding: 1.5rem 3rem 5rem;
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
    max-width: 1300px;
  }

  .panel {
    background: #ffffff04; border: 1px solid var(--border);
    padding: 1.8rem; position: relative; margin-bottom: 1.5rem;
  }
  .panel:last-child { margin-bottom: 0; }
  .pa {
    position: absolute; top: 0; left: 0; width: 3px; height: 34px;
    background: linear-gradient(180deg, var(--orange), var(--gold));
  }
  .pt {
    font-family: 'Share Tech Mono', monospace; font-size: 0.63rem;
    letter-spacing: 0.35em; color: var(--amber); margin-bottom: 1.3rem; text-transform: uppercase;
  }

  label {
    display: block; font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.2em; color: var(--muted);
    margin-bottom: 0.4rem; text-transform: uppercase;
  }
  input[type="text"], input[type="password"], textarea, select {
    width: 100%; background: #0d090088; border: 1px solid #ffffff15;
    color: var(--paper); padding: 0.65rem 0.9rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
    outline: none; transition: border-color 0.2s; resize: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--orange); }
  select option { background: #1a1100; }
  textarea { min-height: 95px; line-height: 1.6; }
  .cfg { margin-bottom: 1.1rem; }
  .row { display: flex; gap: 0.5rem; }

  .tabs { display: flex; border-bottom: 1px solid #ffffff10; margin-bottom: 1.3rem; }
  .tab {
    font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.2em; padding: 0.55rem 1.2rem;
    cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s; text-transform: uppercase;
  }
  .tab.active { color: var(--amber); border-bottom-color: var(--orange); }
  .tab:hover:not(.active) { color: var(--paper); }

  .sgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.4rem; }
  .chip {
    border: 1px solid #ffffff10; padding: 0.4rem 0.2rem; text-align: center;
    font-family: 'Share Tech Mono', monospace; font-size: 0.56rem;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    color: var(--muted); background: transparent;
  }
  .chip:hover { border-color: var(--amber); color: var(--amber); }
  .chip.active { border-color: var(--orange); color: var(--paper); background: #f9731612; }

  /* Image Upload */
  .upload-zone {
    border: 1px dashed #f9731438; padding: 1.4rem; text-align: center;
    cursor: pointer; transition: all 0.2s; position: relative;
    background: #f9731405; min-height: 110px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.4rem;
    overflow: hidden;
  }
  .upload-zone:hover { border-color: var(--orange); background: #f9731610; }
  .upload-zone.has-img { padding: 0; border-style: solid; border-color: var(--orange); }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%; border: none; padding: 0; background: none;
  }
  .upload-zone.has-img input[type="file"] { display: none; }
  .upload-zone img { width: 100%; max-height: 150px; object-fit: cover; display: none; }
  .uz-icon { font-size: 1.6rem; opacity: 0.35; }
  .uz-txt { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; color: var(--muted); }
  .uz-clear {
    position: absolute; top: 5px; right: 5px;
    background: var(--orange); color: #fff; border: none;
    width: 20px; height: 20px; font-size: 10px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
  }
  .upload-zone.has-img .uz-clear { display: flex; }

  .rrow { display: flex; align-items: center; gap: 0.8rem; }
  input[type="range"] { width: 100%; accent-color: var(--orange); }
  .rval { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--amber); min-width: 2.3rem; text-align: right; }

  .btn-save {
    background: #ffffff08; border: 1px solid #ffffff15; color: var(--paper);
    padding: 0.65rem 1rem; font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-save:hover { border-color: var(--amber); color: var(--amber); }

  .btn-gen {
    width: 100%; border: none;
    background: linear-gradient(90deg, var(--orange), var(--gold));
    color: #fff; padding: 0.95rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
    letter-spacing: 0.25em; cursor: pointer; position: relative; overflow: hidden; transition: opacity 0.2s;
  }
  .btn-gen::after {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, #ffffff22, transparent);
    transition: left 0.5s;
  }
  .btn-gen:hover::after { left: 100%; }
  .btn-gen:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Output */
  .out-panel { grid-column: 2; grid-row: 1 / 3; }
  .vframe {
    width: 100%; aspect-ratio: 16/9; background: #000;
    border: 1px solid #f9731618;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; margin-bottom: 0.8rem;
  }
  .vframe::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #f9731606 0%, transparent 70%);
    pointer-events: none; z-index: 1;
  }
  .vph { text-align: center; }
  .vph-i { font-size: 2.4rem; opacity: 0.12; margin-bottom: 0.7rem; display: block; }
  .vph-t { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; letter-spacing: 0.25em; color: #ffffff15; }
  video { width: 100%; height: 100%; object-fit: contain; }

  .loverlay {
    position: absolute; inset: 0; z-index: 2;
    background: #00000085;
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.2rem;
  }
  .loverlay.on { display: flex; }
  .ltxt { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.3em; color: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pbar { width: 170px; height: 2px; background: #ffffff12; overflow: hidden; }
  .pfill { height: 100%; width: 40%; background: linear-gradient(90deg, var(--orange), var(--amber)); animation: slide 1.4s ease-in-out infinite; }
  @keyframes slide { 0%{transform:translateX(-200%)} 100%{transform:translateX(350%)} }

  .btn-dl {
    width: 100%; background: transparent; border: 1px solid #ffffff12; color: var(--muted);
    padding: 0.68rem; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.2em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none;
  }
  .btn-dl:hover { border-color: var(--amber); color: var(--amber); }

  .logbox {
    background: #0d090088; border: 1px solid #ffffff0d; padding: 0.85rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; line-height: 1.9;
    color: #ffffff28; min-height: 85px; max-height: 125px; overflow-y: auto;
  }
  .ll { color: #ffffff50; }
  .ll.ok { color: #4ade80; }
  .ll.err { color: var(--orange); }
  .ll.info { color: var(--amber); }

  .hgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.4rem; margin-top: 0.8rem; }
  .hi { aspect-ratio:16/9; background:#ffffff04; border:1px solid #ffffff0e; position:relative; cursor:pointer; overflow:hidden; transition:border-color .2s; }
  .hi:hover { border-color: var(--amber); }
  .hi video { width:100%; height:100%; object-fit:cover; }
  .hx { position:absolute; top:3px; right:3px; background:var(--orange); color:#fff; border:none; width:18px; height:18px; font-size:9px; cursor:pointer; display:none; align-items:center; justify-content:center; font-family:'Share Tech Mono',monospace; }
  .hi:hover .hx { display:flex; }
  .ehist { grid-column:1/-1; text-align:center; padding:1.5rem; font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:#ffffff15; letter-spacing:.2em; }

  .notif {
    position:fixed; bottom:2rem; right:2rem; background:var(--panel);
    border-left:3px solid var(--amber); padding:0.85rem 1.2rem;
    font-family:'Share Tech Mono',monospace; font-size:0.65rem; color:var(--paper);
    z-index:1000; transform:translateX(120%); transition:transform .3s; max-width:270px;
  }
  .notif.on { transform:translateX(0); }
  .notif.err { border-left-color:var(--orange); }

  .div { border:none; border-top:1px solid #ffffff0a; margin:1.2rem 0; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #f9731628; }

  @media (max-width:820px) {
    header,.hero { padding:1.5rem; }
    .main { padding:1.5rem; grid-template-columns:1fr; }
    .out-panel { grid-column:1; grid-row:auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div>
      <span class="logo-cn">幻影动漫</span>
      <span class="logo-en">AI · VIDEO · GENERATOR</span>
    </div>
  </div>
  <div class="header-badge">PIKA × FAL.AI</div>
</header>

<div class="hero">
  <div class="hero-eye">AI 驱动的动漫视频创作</div>
  <h1 class="hero-title">让想象<span class="hl">动起来</span></h1>
  <p class="hero-sub">文字生成视频 · 图片生成视频 · 多种动漫画风</p>
</div>

<div class="main">

  <!-- LEFT -->
  <div>
    <div class="panel">
      <div class="pa"></div>
      <div class="pt">⚙ API 配置</div>
      <div class="cfg">
        <label>FAL.AI API KEY</label>
        <div class="row">
          <input type="password" id="falKey" placeholder="fal-xxx...">
          <button class="btn-save" onclick="saveKey()">保存</button>
        </div>
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.56rem;color:var(--muted);line-height:1.8">⚠ Key 仅保存在本地浏览器，不上传任何服务器</div>
    </div>

    <div class="panel">
      <div class="pa"></div>
      <div class="pt">✦ 创作输入</div>

      <div class="tabs">
        <div class="tab active" id="t-t2v" onclick="switchMode('t2v')">文 → 视频</div>
        <div class="tab" id="t-i2v" onclick="switchMode('i2v')">图 → 视频</div>
      </div>

      <div class="cfg">
        <label id="promptLabel">画面描述</label>
        <textarea id="prompt" placeholder="例如：银发武士在樱花雨中拔剑，动漫风格，流畅动作，电影镜头..."></textarea>
      </div>

      <div class="cfg" id="imgWrap" style="display:none">
        <label>上传参考图片</label>
        <div class="upload-zone" id="uzone">
          <input type="file" id="imgInput" accept="image/*" onchange="onImgSelect(event)">
          <span class="uz-icon">🖼</span>
          <div class="uz-txt">点击选择图片<br>支持 JPG / PNG / WEBP</div>
          <img id="prevImg">
          <button class="uz-clear" onclick="clearImg(event)">✕</button>
        </div>
      </div>

      <div class="cfg">
        <label>动漫画风</label>
        <div class="sgrid">
          <div class="chip active" data-val="" onclick="selStyle(this)">默认</div>
          <div class="chip" data-val="Japanese anime style, detailed" onclick="selStyle(this)">日式动漫</div>
          <div class="chip" data-val="manga ink style, black and white" onclick="selStyle(this)">漫画风</div>
          <div class="chip" data-val="3D animation, Pixar quality" onclick="selStyle(this)">3D动画</div>
          <div class="chip" data-val="chibi anime, cute round style" onclick="selStyle(this)">Q版萌系</div>
          <div class="chip" data-val="dark fantasy anime, epic lighting" onclick="selStyle(this)">暗黑奇幻</div>
        </div>
      </div>

      <div class="div"></div>

      <div class="cfg">
        <label>视频时长</label>
        <div class="rrow">
          <input type="range" id="dur" min="3" max="5" value="3" step="1"
            oninput="document.getElementById('durv').textContent=this.value+'s'">
          <span class="rval" id="durv">3s</span>
        </div>
      </div>

      <div class="cfg">
        <label>画面比例</label>
        <select id="ratio">
          <option value="16:9">16:9 横屏</option>
          <option value="9:16">9:16 竖屏</option>
          <option value="1:1">1:1 方形</option>
        </select>
      </div>

      <button class="btn-gen" id="genBtn" onclick="generate()">▶ 开始生成</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel out-panel">
    <div class="pa"></div>
    <div class="pt">◈ 生成结果</div>

    <div class="vframe" id="vframe">
      <div class="vph" id="vph">
        <span class="vph-i">⬡</span>
        <div class="vph-t">等待生成...</div>
      </div>
      <video id="vres" controls style="display:none"></video>
      <div class="loverlay" id="loverlay">
        <div class="ltxt" id="ltxt">正在提交任务...</div>
        <div class="pbar"><div class="pfill"></div></div>
      </div>
    </div>

    <a class="btn-dl" id="dlBtn" href="#" download="幻影动漫.mp4" style="pointer-events:none;opacity:0.3">↓ 下载视频</a>

    <div class="div"></div>
    <div class="pt">◈ 状态日志</div>
    <div class="logbox" id="logbox"><div style="color:#ffffff15">// 等待操作...</div></div>

    <div class="div"></div>
    <div class="pt">◈ 历史记录</div>
    <div class="hgrid" id="hgrid"><div class="ehist">暂无历史记录</div></div>
  </div>

</div>

<div class="notif" id="notif"></div>

<script>
let mode = 't2v', styleVal = '', imgB64 = null, imgType = 'image/jpeg';
let hist = JSON.parse(localStorage.getItem('hyin2_hist')||'[]');

window.onload = () => {
  const k = localStorage.getItem('hyin2_key');
  if (k) document.getElementById('falKey').value = k;
  renderHist();
};

function saveKey() {
  const k = document.getElementById('falKey').value.trim();
  if (!k) { toast('请填写 API Key', true); return; }
  localStorage.setItem('hyin2_key', k);
  toast('Key 已保存 ✓');
}

function switchMode(m) {
  mode = m;
  document.getElementById('t-t2v').className = 'tab'+(m==='t2v'?' active':'');
  document.getElementById('t-i2v').className = 'tab'+(m==='i2v'?' active':'');
  document.getElementById('imgWrap').style.display = m==='i2v'?'block':'none';
  document.getElementById('promptLabel').textContent = m==='i2v'?'运动描述（可选）':'画面描述';
  document.getElementById('prompt').placeholder = m==='i2v'
    ? '例如：头发随风飘动，眼神闪烁，缓慢转身...'
    : '例如：银发武士在樱花雨中拔剑，动漫风格，电影镜头...';
}

function onImgSelect(e) {
  const file = e.target.files[0]; if (!file) return;
  imgType = file.type||'image/jpeg';
  const r = new FileReader();
  r.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    const z = document.getElementById('uzone');
    const img = document.getElementById('prevImg');
    img.src = ev.target.result; img.style.display = 'block';
    z.querySelector('.uz-icon').style.display='none';
    z.querySelector('.uz-txt').style.display='none';
    z.classList.add('has-img');
  };
  r.readAsDataURL(file);
}

function clearImg(e) {
  e.stopPropagation(); imgB64=null;
  const z = document.getElementById('uzone');
  const img = document.getElementById('prevImg');
  img.src=''; img.style.display='none';
  z.querySelector('.uz-icon').style.display='';
  z.querySelector('.uz-txt').style.display='';
  z.classList.remove('has-img');
  document.getElementById('imgInput').value='';
}

function selStyle(el) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); styleVal=el.dataset.val;
}

function log(msg, type='') {
  const box = document.getElementById('logbox');
  const d = document.createElement('div');
  const t = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.className=`ll ${type}`; d.textContent=`[${t}] ${msg}`;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}

function toast(msg, isErr=false) {
  const n=document.getElementById('notif');
  n.textContent=msg; n.className='notif on'+(isErr?' err':'');
  setTimeout(()=>n.className='notif',3000);
}

function setLoad(on, txt='正在提交任务...') {
  const btn=document.getElementById('genBtn');
  btn.disabled=on; btn.textContent=on?'⏳ 生成中...':'▶ 开始生成';
  document.getElementById('loverlay').className='loverlay'+(on?' on':'');
  document.getElementById('ltxt').textContent=txt;
}

async function generate() {
  const apiKey=document.getElementById('falKey').value.trim();
  const prompt=document.getElementById('prompt').value.trim();
  const duration=parseInt(document.getElementById('dur').value);
  const ratio=document.getElementById('ratio').value;

  if (!apiKey){toast('请先填写并保存 API Key',true);return;}
  if (mode==='t2v'&&!prompt){toast('请输入画面描述',true);return;}
  if (mode==='i2v'&&!imgB64){toast('请上传参考图片',true);return;}

  setLoad(true,'正在提交任务...'); log('正在提交生成任务...','info');

  let fp=prompt; if(styleVal) fp+=(fp?', ':'')+styleVal;

  try {
    let endpoint, body;
    if (mode==='t2v') {
      endpoint='fal-ai/pika/v2.2/text-to-video';
      body={prompt:fp,duration,aspect_ratio:ratio};
    } else {
      endpoint='fal-ai/pika/v2.2/image-to-video';
      body={prompt:fp||'animate this image naturally',image_url:`data:${imgType};base64,${imgB64}`,duration,aspect_ratio:ratio};
    }

    const res=await fetch(`/api/proxy?path=${endpoint}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Key ${apiKey}`},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if(data.detail||data.error) throw new Error(data.detail||data.error);

    log(`任务已提交 ID: ${data.request_id}`,'ok');
    log('AI 生成中，请稍候（约1-3分钟）...','info');
    setLoad(true,'AI 生成中，请稍候...');
    poll(apiKey,data.status_url,data.response_url);

  } catch(err) {
    setLoad(false); log(`错误: ${err.message}`,'err'); toast(err.message,true);
  }
}

async function poll(apiKey,statusUrl,responseUrl) {
  try {
    const sp=statusUrl.replace('https://queue.fal.run/','');
    const sr=await fetch(`/api/proxy?path=${encodeURIComponent(sp)}`,{headers:{'Authorization':`Key ${apiKey}`}});
    const sd=await sr.json();
    const status=sd.status||sd.raw;
    log(`状态: ${status}`);

    if (status==='COMPLETED') {
      const rp=responseUrl.replace('https://queue.fal.run/','');
      const rr=await fetch(`/api/proxy?path=${encodeURIComponent(rp)}`,{headers:{'Authorization':`Key ${apiKey}`}});
      const rd=await rr.json();
      const url=rd?.video?.url||rd?.output?.video?.url||rd?.output?.video_url||rd?.videos?.[0]?.url;
      if (url) {
        log('✓ 生成成功！','ok');
        showVideo(url);
        addHist(url,document.getElementById('prompt').value.trim());
        toast('视频生成成功！🎉');
      } else {
        // Log full response to find the correct field
        log('完整响应: '+JSON.stringify(rd),'info');
        // Try deeper search
        const deepUrl = findVideoUrl(rd);
        if (deepUrl) {
          log('✓ 生成成功（深度搜索）！','ok');
          showVideo(deepUrl);
          addHist(deepUrl,document.getElementById('prompt').value.trim());
          toast('视频生成成功！🎉');
        } else {
          throw new Error('未找到视频链接，请查看日志');
        }
      }
      setLoad(false);
    } else if (status==='FAILED') {
      throw new Error(sd.error||'生成失败，请修改提示词重试');
    } else {
      setTimeout(()=>poll(apiKey,statusUrl,responseUrl),5000);
    }
  } catch(err) {
    setLoad(false); log(`错误: ${err.message}`,'err'); toast(err.message,true);
  }
}

function findVideoUrl(obj, depth=0) {
  if (depth > 6 || !obj || typeof obj !== 'object') return null;
  for (const key of Object.keys(obj)) {
    const val = obj[key];
    if (typeof val === 'string' && (val.includes('.mp4') || val.includes('.webm') || val.includes('video'))) {
      return val;
    }
    if (typeof val === 'object') {
      const found = findVideoUrl(val, depth+1);
      if (found) return found;
    }
  }
  return null;
}

function showVideo(url) {
  document.getElementById('vph').style.display='none';
  const v=document.getElementById('vres');
  v.style.display='block'; v.src=url; v.play();
  const dl=document.getElementById('dlBtn');
  dl.href=url; dl.style.pointerEvents='auto'; dl.style.opacity='1';
}

function addHist(url,prompt) {
  hist.unshift({url,prompt,time:Date.now()});
  if(hist.length>12) hist=hist.slice(0,12);
  localStorage.setItem('hyin2_hist',JSON.stringify(hist));
  renderHist();
}

function renderHist() {
  const g=document.getElementById('hgrid');
  if(!hist.length){g.innerHTML='<div class="ehist">暂无历史记录</div>';return;}
  g.innerHTML=hist.map((h,i)=>`
    <div class="hi" title="${h.prompt}">
      <video src="${h.url}" muted loop onclick="showVideo('${h.url}')"></video>
      <button class="hx" onclick="delHist(${i},event)">✕</button>
    </div>
  `).join('');
}

function delHist(i,e) {
  e.stopPropagation(); hist.splice(i,1);
  localStorage.setItem('hyin2_hist',JSON.stringify(hist)); renderHist();
}
</script>
