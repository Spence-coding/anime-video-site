<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻影动漫 · AI视频生成</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #d4a017;
    --muted: #7a7060;
    --panel: #1a1820;
    --accent: #e8d5a3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 10;
    padding: 2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ffffff15;
  }
  .logo { display: flex; align-items: baseline; gap: 0.6rem; }
  .logo-jp {
    font-weight: 900;
    font-size: 1.8rem;
    color: var(--paper);
    letter-spacing: 0.1em;
    position: relative;
  }
  .logo-jp::after {
    content: '幻影';
    position: absolute;
    top: 2px; left: 2px;
    color: var(--red);
    z-index: -1;
  }
  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.3em;
  }
  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    border: 1px solid #ffffff20;
    padding: 0.3rem 0.8rem;
  }
  .hero {
    position: relative;
    z-index: 10;
    padding: 4rem 3rem 2rem;
    max-width: 900px;
  }
  .hero-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--red);
    letter-spacing: 0.4em;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .hero-label::before {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: var(--red);
  }
  .hero-title {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 1rem;
  }
  .hero-title span {
    color: var(--gold);
    position: relative;
    display: inline-block;
  }
  .hero-title span::after {
    content: attr(data-text);
    position: absolute;
    top: 3px; left: 3px;
    color: var(--red);
    z-index: -1;
    opacity: 0.5;
  }
  .hero-desc { color: var(--muted); font-size: 0.95rem; line-height: 1.8; }

  .main {
    position: relative;
    z-index: 10;
    padding: 2rem 3rem 5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    max-width: 1200px;
  }
  .panel {
    background: #ffffff05;
    border: 1px solid #ffffff15;
    padding: 2rem;
    position: relative;
    margin-bottom: 1.5rem;
  }
  .panel:last-child { margin-bottom: 0; }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 40px;
    background: var(--red);
  }
  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .config-section { margin-bottom: 1.2rem; }
  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }
  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    background: #0a0a0f;
    border: 1px solid #ffffff20;
    color: var(--paper);
    padding: 0.75rem 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--gold); }
  select option { background: #1a1820; }
  textarea { min-height: 110px; line-height: 1.6; }

  .api-row { display: flex; gap: 0.5rem; }
  .btn-save {
    background: #ffffff10;
    border: 1px solid #ffffff20;
    color: var(--paper);
    padding: 0.75rem 1.2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-save:hover { border-color: var(--gold); color: var(--gold); }

  .style-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }
  .style-chip {
    border: 1px solid #ffffff15;
    padding: 0.5rem;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: transparent;
  }
  .style-chip:hover { border-color: var(--gold); color: var(--gold); }
  .style-chip.active { border-color: var(--red); color: var(--paper); background: #c0392b20; }

  .btn-primary {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    padding: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, #ffffff20, transparent);
    transition: left 0.4s;
  }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover { background: #a93226; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }

  /* Output */
  .output-panel { grid-column: 2; grid-row: 1 / 3; }
  .video-frame {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border: 1px solid #ffffff10;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .video-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 8px solid transparent;
    border-image: repeating-linear-gradient(
      45deg, #ffffff08 0px, #ffffff08 2px,
      transparent 2px, transparent 8px
    ) 8;
    pointer-events: none;
  }
  .video-placeholder { text-align: center; color: var(--muted); }
  .video-placeholder .big-icon { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.3; }
  .video-placeholder p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #ffffff20;
  }
  video { width: 100%; height: 100%; object-fit: contain; }

  .loading-overlay {
    position: absolute; inset: 0;
    background: #000000cc;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  .loading-overlay.active { display: flex; }
  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .progress-bar { width: 200px; height: 2px; background: #ffffff15; position: relative; overflow: hidden; }
  .progress-fill {
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: var(--red);
    animation: scan 1.5s ease-in-out infinite;
  }
  @keyframes scan { 0%{left:-100%} 100%{left:100%} }

  .status-log {
    background: #000;
    border: 1px solid #ffffff10;
    padding: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    line-height: 1.8;
    color: #ffffff40;
    min-height: 80px;
    max-height: 130px;
    overflow-y: auto;
  }
  .log-line { color: #ffffff60; }
  .log-line.success { color: #2ecc71; }
  .log-line.error { color: var(--red); }
  .log-line.info { color: var(--gold); }

  .btn-download {
    width: 100%;
    background: transparent;
    border: 1px solid #ffffff20;
    color: var(--muted);
    padding: 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    text-decoration: none;
    margin-top: 0.5rem;
  }
  .btn-download:hover { border-color: var(--gold); color: var(--gold); }

  .history-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .history-item {
    aspect-ratio: 16/9;
    background: #ffffff05;
    border: 1px solid #ffffff10;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--gold); }
  .history-item video { width: 100%; height: 100%; object-fit: cover; }
  .history-item .del-btn {
    position: absolute; top: 4px; right: 4px;
    background: #c0392b; color: #fff; border: none;
    width: 20px; height: 20px; font-size: 10px;
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
  }
  .history-item:hover .del-btn { display: flex; }
  .empty-history {
    grid-column: 1/-1; text-align: center; padding: 2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; color: #ffffff20; letter-spacing: 0.2em;
  }

  .divider { border: none; border-top: 1px solid #ffffff10; margin: 1.5rem 0; }
  input[type="range"] { width: 100%; accent-color: var(--red); margin-top: 0.3rem; }
  .range-row { display: flex; align-items: center; gap: 1rem; }
  .range-val { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--gold); min-width: 2.5rem; text-align: right; }

  .notif {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--panel);
    border-left: 3px solid var(--gold);
    padding: 1rem 1.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; color: var(--paper);
    z-index: 1000;
    transform: translateX(120%);
    transition: transform 0.3s;
    max-width: 300px;
  }
  .notif.show { transform: translateX(0); }
  .notif.error { border-left-color: var(--red); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ffffff20; }

  @media (max-width: 768px) {
    header, .hero { padding: 1.5rem; }
    .main { padding: 1.5rem; grid-template-columns: 1fr; }
    .output-panel { grid-column: 1; grid-row: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-jp">幻影动漫</span>
    <span class="logo-sub">AI · VIDEO · GEN</span>
  </div>
  <div class="header-tag">POWERED BY PIKA · fal.ai</div>
</header>

<div class="hero">
  <div class="hero-label">AI 驱动的动漫视频创作</div>
  <h1 class="hero-title">用文字<br><span data-text="召唤动漫">召唤动漫</span></h1>
  <p class="hero-desc">输入你的想象，Pika AI 为你生成动漫风格短视频。</p>
</div>

<div class="main">

  <!-- Left -->
  <div>
    <div class="panel">
      <div class="panel-title">⚙ API 配置</div>
      <div class="config-section">
        <label>FAL.AI API KEY</label>
        <div class="api-row">
          <input type="password" id="falKey" placeholder="输入 fal.ai API Key（fal-xxx...）">
          <button class="btn-save" onclick="saveKey()">保存</button>
        </div>
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);line-height:1.8">
        ⚠ Key 仅保存在本地浏览器，不会上传任何服务器
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ 创作输入</div>

      <div class="config-section">
        <label>画面描述</label>
        <textarea id="prompt" placeholder="例如：银发武士在樱花雨中拔剑，动漫风格，流畅动作，电影镜头..."></textarea>
      </div>

      <div class="config-section">
        <label>动漫画风（追加到提示词）</label>
        <div class="style-grid" id="styleGrid">
          <div class="style-chip active" data-val="" onclick="selectStyle(this)">默认</div>
          <div class="style-chip" data-val="Japanese anime style, detailed" onclick="selectStyle(this)">日式动漫</div>
          <div class="style-chip" data-val="manga style, black and white ink" onclick="selectStyle(this)">漫画风</div>
          <div class="style-chip" data-val="3D animation style, Pixar quality" onclick="selectStyle(this)">3D动画</div>
          <div class="style-chip" data-val="chibi anime style, cute, round" onclick="selectStyle(this)">Q版萌系</div>
          <div class="style-chip" data-val="dark fantasy anime, epic cinematic" onclick="selectStyle(this)">暗黑奇幻</div>
        </div>
      </div>

      <hr class="divider">

      <div class="config-section">
        <label>视频时长（秒）</label>
        <div class="range-row">
          <input type="range" id="duration" min="3" max="5" value="3" step="1"
            oninput="document.getElementById('durVal').textContent=this.value+'s'">
          <span class="range-val" id="durVal">3s</span>
        </div>
      </div>

      <div class="config-section">
        <label>画面比例</label>
        <select id="aspectRatio">
          <option value="16:9">16:9 横屏</option>
          <option value="9:16">9:16 竖屏</option>
          <option value="1:1">1:1 方形</option>
        </select>
      </div>

      <button class="btn-primary" id="generateBtn" onclick="generateVideo()">
        ▶ 开始生成
      </button>
    </div>
  </div>

  <!-- Right -->
  <div class="panel output-panel">
    <div class="panel-title">◈ 生成结果</div>

    <div class="video-frame" id="videoFrame">
      <div class="video-placeholder" id="videoPlaceholder">
        <span class="big-icon">⬡</span>
        <p>等待生成...</p>
      </div>
      <video id="resultVideo" controls style="display:none"></video>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text" id="loadingText">正在提交任务...</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>
    </div>

    <a class="btn-download" id="downloadBtn" href="#" download="幻影动漫.mp4" style="pointer-events:none;opacity:0.3">
      ↓ 下载视频
    </a>

    <hr class="divider">

    <div class="panel-title">◈ 状态日志</div>
    <div class="status-log" id="statusLog">
      <div style="color:#ffffff20">// 等待操作...</div>
    </div>

    <hr class="divider">

    <div class="panel-title">◈ 历史记录</div>
    <div class="history-grid" id="historyGrid">
      <div class="empty-history">暂无历史记录</div>
    </div>
  </div>

</div>

<div class="notif" id="notif"></div>

<script>
// ── State ─────────────────────────────────────────────────────────
let selectedStyle = '';
let history = JSON.parse(localStorage.getItem('hyin_history') || '[]');

window.onload = () => {
  const k = localStorage.getItem('hyin_fal_key');
  if (k) document.getElementById('falKey').value = k;
  renderHistory();
};

// ── Save Key ──────────────────────────────────────────────────────
function saveKey() {
  const k = document.getElementById('falKey').value.trim();
  if (!k) { showNotif('请填写 API Key', true); return; }
  localStorage.setItem('hyin_fal_key', k);
  showNotif('Key 已保存到本地 ✓');
}

// ── Style ─────────────────────────────────────────────────────────
function selectStyle(el) {
  document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedStyle = el.dataset.val;
}

// ── Log ───────────────────────────────────────────────────────────
function log(msg, type = '') {
  const el = document.getElementById('statusLog');
  const line = document.createElement('div');
  const t = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  line.className = `log-line ${type}`;
  line.textContent = `[${t}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ── Notif ─────────────────────────────────────────────────────────
function showNotif(msg, isError = false) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = 'notif show' + (isError ? ' error' : '');
  setTimeout(() => n.className = 'notif', 3000);
}

// ── Loading ───────────────────────────────────────────────────────
function setLoading(active, text = '正在提交任务...') {
  const btn = document.getElementById('generateBtn');
  const overlay = document.getElementById('loadingOverlay');
  btn.disabled = active;
  btn.textContent = active ? '⏳ 生成中...' : '▶ 开始生成';
  overlay.className = 'loading-overlay' + (active ? ' active' : '');
  document.getElementById('loadingText').textContent = text;
}

// ── Generate ──────────────────────────────────────────────────────
async function generateVideo() {
  const apiKey = document.getElementById('falKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  const duration = parseInt(document.getElementById('duration').value);
  const aspectRatio = document.getElementById('aspectRatio').value;

  if (!apiKey) { showNotif('请先填写并保存 API Key', true); return; }
  if (!prompt) { showNotif('请输入画面描述', true); return; }

  setLoading(true, '正在提交任务...');
  log('正在提交生成任务...', 'info');

  // Build final prompt
  let finalPrompt = prompt;
  if (selectedStyle) finalPrompt += `, ${selectedStyle}`;

  try {
    // Submit to fal.ai queue (Pika v2.2)
    const submitRes = await fetch('/api/proxy?path=fal-ai/pika-v2-2/text-to-video', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Key ${apiKey}`
      },
      body: JSON.stringify({
        prompt: finalPrompt,
        duration: duration,
        aspect_ratio: aspectRatio
      })
    });

    const submitData = await submitRes.json();

    if (submitData.detail || submitData.error) {
      throw new Error(submitData.detail || submitData.error);
    }

    const requestId = submitData.request_id;
    log(`任务已提交，ID: ${requestId}`, 'success');
    log('AI 生成中，请稍候（约1-3分钟）...', 'info');
    setLoading(true, 'AI 生成中，请稍候...');

    pollResult(apiKey, requestId);

  } catch (err) {
    setLoading(false);
    log(`错误: ${err.message}`, 'error');
    showNotif(err.message, true);
  }
}

// ── Poll ──────────────────────────────────────────────────────────
async function pollResult(apiKey, requestId) {
  try {
    const res = await fetch(`/api/proxy?path=fal-ai/pika-v2-2/text-to-video/requests/${requestId}`, {
      headers: { 'Authorization': `Key ${apiKey}` }
    });

    const data = await res.json();
    const status = data.status;
    log(`状态: ${status}`);

    if (status === 'COMPLETED') {
      const videoUrl = data.output?.video?.url || data.output?.video_url;
      if (videoUrl) {
        log('✓ 生成成功！', 'success');
        showVideo(videoUrl);
        addToHistory(videoUrl, document.getElementById('prompt').value.trim());
        showNotif('视频生成成功！🎉');
      } else {
        throw new Error('未获取到视频链接');
      }
      setLoading(false);

    } else if (status === 'FAILED') {
      throw new Error(data.error || '生成失败，请修改提示词重试');

    } else {
      // IN_QUEUE or IN_PROGRESS
      setTimeout(() => pollResult(apiKey, requestId), 5000);
    }

  } catch (err) {
    setLoading(false);
    log(`错误: ${err.message}`, 'error');
    showNotif(err.message, true);
  }
}

// ── Show Video ────────────────────────────────────────────────────
function showVideo(url) {
  document.getElementById('videoPlaceholder').style.display = 'none';
  const video = document.getElementById('resultVideo');
  video.style.display = 'block';
  video.src = url;
  video.play();

  const dl = document.getElementById('downloadBtn');
  dl.href = url;
  dl.style.pointerEvents = 'auto';
  dl.style.opacity = '1';
}

// ── History ───────────────────────────────────────────────────────
function addToHistory(url, prompt) {
  history.unshift({ url, prompt, time: Date.now() });
  if (history.length > 12) history = history.slice(0, 12);
  localStorage.setItem('hyin_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const grid = document.getElementById('historyGrid');
  if (!history.length) {
    grid.innerHTML = '<div class="empty-history">暂无历史记录</div>';
    return;
  }
  grid.innerHTML = history.map((h, i) => `
    <div class="history-item" title="${h.prompt}">
      <video src="${h.url}" muted loop onclick="showVideo('${h.url}')"></video>
      <button class="del-btn" onclick="deleteHistory(${i},event)">✕</button>
    </div>
  `).join('');
}

function deleteHistory(i, e) {
  e.stopPropagation();
  history.splice(i, 1);
  localStorage.setItem('hyin_history', JSON.stringify(history));
  renderHistory();
}
</script>
</body>
</html>
